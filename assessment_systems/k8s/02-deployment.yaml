
# Deployment – AKS Assessment Application
# Achieves basic High Availability via:
#   - replicas: 2 (minimum)  +  HPA scales to 5
#   - topologySpreadConstraints across nodes
#   - PodDisruptionBudget (see 04-pdb.yaml)
#   - Rolling update with zero-downtime strategy

apiVersion: apps/v1
kind: Deployment
metadata:
  name: assessment-app
  namespace: assessment
  labels:
    app: assessment-app
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assessment-app

  # Zero-downtime rolling update
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: assessment-app
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: assessment-app

      imagePullSecrets:
        - name: acr-pull-secret  # (if using imagePullSecrets instead of ACR integration with AKS)

      containers:
        - name: assessment-app
          image: <ACR_LOGIN_SERVER>/assessment-app:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: APP_ENV
              value: "production"
            - name: PORT
              value: "8080"

          envFrom:
            - secretRef:
                name: app-secrets   

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 5

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: azure-kv-secrets
        - name: tmp
          emptyDir: {}
          
      terminationGracePeriodSeconds: 30
